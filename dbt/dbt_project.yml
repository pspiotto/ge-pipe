name: ge_pipe
version: "1.0.0"
config-version: 2

profile: ge_pipe

vars:
  # agg_flip_opportunities.is_high_value = high_price >= this. Flags expensive,
  # typically low-volume gear so the bot can treat it as a separate lane.
  high_value_threshold_gp: 1000000

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ge_pipe:
    staging:
      +schema: stg
      +materialized: view
    marts:
      +schema: marts
      +materialized: table
      # Fail fast if a rebuild can't get its lock (e.g. a downstream reader holds
      # one) instead of hanging for minutes and backing up the run queue. The run
      # errors and the next scheduled tick retries.
      +pre-hook: "set local lock_timeout = '30s'"

seeds:
  ge_pipe:
    tax_exempt_items:
      +column_types:
        item_id: integer

tests:
  ge_pipe:
    assert_price_high_gte_low:
      +severity: warn
