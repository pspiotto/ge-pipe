name: ge_pipe
version: "1.0.0"
config-version: 2

profile: ge_pipe

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ge_pipe:
    staging:
      +schema: stg
      +materialized: view
    marts:
      +schema: marts
      +materialized: table
      # Fail fast if a rebuild can't get its lock (e.g. a downstream reader holds
      # one) instead of hanging for minutes and backing up the run queue. The run
      # errors and the next scheduled tick retries.
      +pre-hook: "set local lock_timeout = '30s'"

tests:
  ge_pipe:
    assert_price_high_gte_low:
      +severity: warn
