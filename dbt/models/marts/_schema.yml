version: 2

models:
  - name: dim_items
    description: "Item dimension — one row per OSRS GE-tradeable item. Full refresh daily."
    columns:
      - name: item_id
        description: "Unique OSRS item ID"
        tests: [not_null, unique]
      - name: item_name
        tests: [not_null]
      - name: is_tax_exempt
        description: "Intrinsically GE-tax-exempt item (tools, bonds) per the tax_exempt_items seed. Does NOT include the price-dependent <=50gp rule."
        tests: [not_null]

  - name: fct_prices
    description: "5-minute GE price fact table. Grain: one row per (item_id, price_timestamp)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [item_id, price_timestamp]
    columns:
      - name: item_id
        tests: [not_null]
      - name: price_timestamp
        tests: [not_null]
      - name: avg_high_price
        description: "Average instant-buy price over the 5-minute window"
      - name: avg_low_price
        description: "Average instant-sell price over the 5-minute window"

  - name: agg_flip_opportunities
    description: >
      Current best flip opportunities: items where (high - low - tax) > 0
      with sufficient volume on both sides to actually execute the flip.
      Hybrid freshness — prices from the real-time /latest feed (refreshed every
      minute), volume from the most recent 5-minute window. Grain: one row per
      qualifying item.
    columns:
      - name: item_id
        tests: [not_null, unique]
      - name: high_price
        description: "Real-time instant-buy price (from /latest)"
      - name: low_price
        description: "Real-time instant-sell price (from /latest)"
      - name: high_price_volume
        description: "Buy-side volume from the most recent 5-minute window"
      - name: low_price_volume
        description: "Sell-side volume from the most recent 5-minute window"
      - name: price_updated_at
        description: "When the real-time price snapshot was loaded"
      - name: tax_gp
        description: "GE tax on the sale: floor(2% of high_price) capped at 5,000,000 gp; 0 when is_tax_exempt or high_price < 50."
      - name: is_tax_exempt
        description: "Whether the item is intrinsically GE-tax-exempt (from dim_items)."
      - name: volume_per_hour
        description: "Units traded in the most recent completed hour (from agg_item_liquidity)."
      - name: avg_volume_per_hour_24h
        description: "Rolling average hourly volume over the trailing 24h."
      - name: est_hours_to_fill_limit
        description: "Estimated hours to trade through buy_limit at volume_per_hour. Lower = fills faster."

  - name: agg_item_liquidity
    description: >
      Per-item hourly liquidity from the /1h volume feed. Grain: one row per item.
      Refreshed hourly; read by agg_flip_opportunities for time-to-fill.
    columns:
      - name: item_id
        tests: [not_null, unique]
      - name: volume_per_hour
        description: "Units traded in the most recent completed hour (high + low side)."
      - name: avg_volume_per_hour_24h
        description: "Rolling average hourly volume over the trailing 24h."
      - name: hours_observed_24h
        description: "Number of hourly buckets backing the 24h average (warm-up indicator, ramps to 24)."

  - name: realized_fills
    description: >
      Bot trade outcomes (fill/cancel events) — the feedback loop. Grain: one row
      per event. Enables realized-vs-predicted profit, actual time-to-fill vs
      est_hours_to_fill_limit, slippage, and fill/cancel rates by cadence.
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: flip_id
        tests: [not_null]
      - name: item_id
        tests: [not_null]
      - name: fill_ratio
        description: "filled_qty / requested_qty."
      - name: slippage_gp
        description: "Per-unit avg_fill_price - offer_price (signed; interpret by leg)."
      - name: time_to_fill_hours
        description: "Actual fill time — compare against agg_flip_opportunities.est_hours_to_fill_limit."
      - name: realized_profit
        description: "Realized profit on the closing (sell) leg: proceeds - cost - tax."
