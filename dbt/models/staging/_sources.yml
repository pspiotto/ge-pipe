version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw tables loaded directly from the OSRS Wiki prices API"
    tables:
      - name: item_mapping
        description: "Item ID to metadata mapping from /mapping. Full refresh daily."
        columns:
          - name: item_id
            description: "Unique OSRS item ID"
            tests: [not_null, unique]
          - name: name
            tests: [not_null]

      - name: prices_5m
        description: "5-minute average GE prices for all tradeable items. ~25k rows per tick. Source of trade volume."
        freshness:
          warn_after: {count: 15, period: minute}
          error_after: {count: 60, period: minute}
        loaded_at_field: loaded_at
        columns:
          - name: item_id
            tests: [not_null]
          - name: timestamp
            tests: [not_null]

      - name: prices_latest
        description: "Real-time last-traded GE prices from /latest, polled every minute. Appended only on price change. No volume."
        freshness:
          warn_after: {count: 5, period: minute}
          error_after: {count: 30, period: minute}
        loaded_at_field: loaded_at
        columns:
          - name: item_id
            tests: [not_null]
          - name: loaded_at
            tests: [not_null]

      - name: prices_1h
        description: "1-hour average GE prices/volume for all tradeable items, polled hourly. Source of hourly volume."
        freshness:
          warn_after: {count: 90, period: minute}
          error_after: {count: 180, period: minute}
        loaded_at_field: loaded_at
        columns:
          - name: item_id
            tests: [not_null]
          - name: timestamp
            tests: [not_null]

      - name: realized_fills
        description: "Trade fill/cancel events written directly by the bot (append-only, one row per event). The feedback loop. No freshness check — fills are event-driven and sporadic."
        columns:
          - name: flip_id
            tests: [not_null]
          - name: item_id
            tests: [not_null]
          - name: leg
            tests:
              - not_null
              - accepted_values:
                  values: ['buy', 'sell']
          - name: event
            tests:
              - not_null
              - accepted_values:
                  values: ['filled', 'partial', 'cancelled_deadline', 'cancelled_pricemove']
